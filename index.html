<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inicial-scale=1.0">
        <title>Ejercicios basicos de JAVASCRIPT + HTML + CSS</title>
        <link rel="stylesheet" href="style.css">
    </head>
    
    <body>
        <div class="container">
            <h1>Ejercicios Practicos de HTML + CSS + JS</h1>
            <!-- Calcular el IMC indice de masa corporal-->
            <div class="ejercicio">
                <h2>
                    Ejercicio 1: Calculadora de IMC
                </h2>

                <p>
                    Calcular el IMC usando variables y operaciones. Formula: IMC= peso / (altura)2 
                </p>

                <div class="input-group">
                    <label for="altura">
                        Peso (kilogramos):
                    </label>
                    <input type="number" name="peso" id="peso" placeholder="Ej: 70 kilogramos">
                </div>

                <div class="input-group">
                    <label for="altura">
                        Altura (metros):
                    </label>
                    <input type="number" name="altura" id="altura" placeholder="Ej: 1.75 metros">
                </div>

                <button>
                    Calcular IMC
                </button>

            </div>
        </div>
    </body>
    </html>
